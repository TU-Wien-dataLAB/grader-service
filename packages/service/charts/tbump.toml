# tbump config for the Helm charts only.
#
# The chart version is independent of the grader-service version. Use this config
# to cut a chart-only release (e.g. a values/templates fix) without releasing a
# new service wheel or Docker image. Run from this directory:
#
#   tbump X.Y.Z        # or: tbump patch | tbump minor | tbump major
#
# It bumps the chart `version:` in both Chart.yaml files (and the all-in-one
# subchart dependency, which shares the version), creates a commit
# `Bump chart to X.Y.Z`, tags `grader-service-chart-X.Y.Z`, and pushes.
# The chart is published by creating a GitHub Release from that tag.
#
# `appVersion` tracks the service version and is bumped by the service tbump,
# NOT here.

github_url = "https://github.com/TU-Wien-dataLAB/grader-service"

[version]
current = "0.12.0"
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
'''

[git]
message_template = "Bump chart to {new_version}"
tag_template = "grader-service-chart-{new_version}"

[[file]]
src = "grader-service/Chart.yaml"
search = "version: {current_version}"

[[file]]
src = "grader-service-all-in-one/Chart.yaml"
search = "version: {current_version}"
