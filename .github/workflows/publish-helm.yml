name: Publish Helm Chart

on:
  workflow_call:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'grader-service-')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Package Helm chart
        run: helm package packages/service/charts/grader-service

      - name: Push to Helm Registry
        run: helm push grader-service-*.tgz oci://${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_ORG }}/charts
