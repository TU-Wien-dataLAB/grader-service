name: Test Service

on:
  workflow_call:
  pull_request:
    paths:
      - 'packages/service/**'
      - '.github/workflows/test-service.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TESTCONTAINER_DOCKER_NETWORK: postgresql-testcontainers
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --package grader-service

      - name: Create Docker network
        run: docker network create ${{ env.TESTCONTAINER_DOCKER_NETWORK }}

      - name: Run tests
        run: |
          git config --global user.name "Grader Test"
          git config --global user.email "grader@example.com"
          uv run --package grader-service pytest packages/service/grader_service/tests --cov

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-service
          path: packages/service/htmlcov/
