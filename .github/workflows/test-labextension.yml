name: Test Labextension

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install the project
        run: uv sync --locked --all-packages --dev --group test

      - name: Install npm dependencies
        working-directory: packages/labextension
        run: uv run jlpm

      - name: Lint Python code
        run: uv run ruff check packages/labextension/grader_labextension

      - name: Run Python tests
        run: uv run pytest packages/labextension/grader_labextension/tests

      - name: Run JavaScript tests
        working-directory: packages/labextension
        run: uv run jlpm test
