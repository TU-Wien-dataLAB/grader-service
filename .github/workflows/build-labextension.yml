name: Build Labextension

on:
  workflow_call:
  pull_request:
    paths:
      - 'packages/labextension/**'
      - '.github/workflows/build-labextension.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Sync dependencies
        run: uv sync --package grader-labextension

      - name: Install npm dependencies
        working-directory: packages/labextension
        run: jlpm

      - name: Build extension
        working-directory: packages/labextension
        run: jlpm build:prod

      - name: Run ruff check
        run: uv run --package grader-labextension ruff check packages/labextension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-labextension
          path: packages/labextension/dist/
