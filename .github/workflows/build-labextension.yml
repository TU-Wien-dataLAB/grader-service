name: Build Labextension

on:
  workflow_call:
  pull_request:
    paths:
      - 'packages/labextension/**'
      - '.github/workflows/build-labextension.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install the project
        run: uv sync --locked --dev

      - name: Install npm dependencies
        working-directory: packages/labextension
        run: jlpm

      - name: Build extension
        working-directory: packages/labextension
        run: jlpm build:prod

      - name: Run ruff check
        run: uv run ruff check packages/labextension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-labextension
          path: packages/labextension/dist/
