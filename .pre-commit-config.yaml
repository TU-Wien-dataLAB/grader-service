repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-format
        name: ruff format (service)
        files: ^packages/service/.*\.py$
      - id: ruff
        name: ruff check (service)
        files: ^packages/service/.*\.py$
        args: [--fix]
      - id: ruff-format
        name: ruff format (labextension)
        files: ^packages/labextension/.*\.py$
      - id: ruff
        name: ruff check (labextension)
        files: ^packages/labextension/.*\.py$
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (labextension)
        files: ^packages/labextension/.*\.(ts|tsx|js|jsx|css|json)$
        additional_dependencies:
          - prettier@3.1.0

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
